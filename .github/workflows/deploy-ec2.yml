name: Deploy EC2

on:
  workflow_run:
    workflows: ["Build and Publish Images"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ${{ secrets.EC2_APP_DIR }}/.docker-data/strapi
            mkdir -p ${{ secrets.EC2_APP_DIR }}/.docker-data/uploads

      - name: Upload deploy compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.deploy.yml
          target: ${{ secrets.EC2_APP_DIR }}
          strip_components: 0

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            export APP_IMAGE=ghcr.io/${{ secrets.GHCR_OWNER }}/netas-academy:${{ env.DEPLOY_SHA }}
            export STRAPI_PUBLIC_URL=http://${{ secrets.EC2_HOST }}:1337
            printf "APP_IMAGE=%s\nSTRAPI_PUBLIC_URL=%s\n" "$APP_IMAGE" "$STRAPI_PUBLIC_URL" > .env
            cp docker-compose.deploy.yml docker-compose.yml
            for attempt in 1 2 3 4 5; do
              echo "GHCR connectivity probe attempt ${attempt}/5"
              status_code="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' --location --max-time 15 https://ghcr.io/v2/ || true)"

              if [ "${status_code}" = "200" ] || [ "${status_code}" = "401" ]; then
                break
              fi

              if [ "${attempt}" -eq 5 ]; then
                echo "Unable to reach ghcr.io after 5 attempts. Last status: ${status_code:-unknown}" >&2
                exit 1
              fi

              sleep $((attempt * 10))
            done

            for attempt in 1 2 3 4 5; do
              echo "GHCR login attempt ${attempt}/5"
              if echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin; then
                break
              fi

              if [ "${attempt}" -eq 5 ]; then
                echo "docker login to ghcr.io failed after 5 attempts." >&2
                exit 1
              fi

              sleep $((attempt * 10))
            done

            for attempt in 1 2 3 4 5; do
              echo "docker compose pull attempt ${attempt}/5"
              if docker compose pull; then
                break
              fi

              if [ "${attempt}" -eq 5 ]; then
                echo "docker compose pull failed after 5 attempts." >&2
                exit 1
              fi

              sleep $((attempt * 10))
            done

            docker compose down
            docker compose up -d --remove-orphans --wait --wait-timeout 180
            docker compose ps
            docker image prune -f

      - name: Collect remote logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_APP_DIR }}
            docker compose ps || true
            docker compose logs --tail=200 app || true
