name: Build and Publish Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/netas-academy-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start backend for frontend build
        run: |
          docker run -d --name netas-backend-build \
            -e NODE_ENV=production \
            -e HOST=0.0.0.0 \
            -e PORT=1337 \
            -e APP_KEYS=app-key-1,app-key-2,app-key-3,app-key-4 \
            -e ADMIN_JWT_SECRET=change-admin-jwt-secret \
            -e API_TOKEN_SALT=change-api-token-salt \
            -e TRANSFER_TOKEN_SALT=change-transfer-token-salt \
            -e ENCRYPTION_KEY=change-encryption-key \
            -e JWT_SECRET=change-jwt-secret \
            -e DATABASE_CLIENT=sqlite \
            -e DATABASE_FILENAME=.tmp/data.db \
            -e EMAIL_PROVIDER=sendmail \
            -e EMAIL_DEFAULT_FROM='Netas Academy <no-reply@example.local>' \
            -e EMAIL_DEFAULT_REPLY_TO='support@example.local' \
            -e EMAIL_TEST_ADDRESS='test@example.local' \
            -p 1337:1337 \
            ghcr.io/${{ github.repository_owner }}/netas-academy-backend:latest

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl --fail --silent "http://127.0.0.1:1337/api/events?pagination[pageSize]=1" > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker logs netas-backend-build
          exit 1

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          build-args: |
            STRAPI_URL=http://host.docker.internal:1337
          tags: ghcr.io/${{ github.repository_owner }}/netas-academy-frontend:latest

      - name: Cleanup build backend
        if: always()
        run: docker rm -f netas-backend-build || true
